<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AK Beauty Shop</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">AK Beauty Shop</div>
        <div class="cart-icon" id="cart-btn">
            🛒 <span id="cart-count">0</span>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Discover Your True Beauty</h1>
            <p>Premium beauty and skincare products at the best prices in Pakistan.</p>
            <button class="cta-btn" onclick="document.getElementById('products').scrollIntoView({behavior: 'smooth'})">Shop Now</button>
        </div>
    </section>

    <main>
        <section id="products" class="products-section">
            <h2>Our Top Products</h2>
            <div class="product-grid" id="product-list">
                <!-- Products will be dynamically inserted here -->
            </div>
        </section>
    </main>

    <!-- Cart Modal -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-cart">&times;</span>
            <h2>Your Cart</h2>
            <div id="cart-items"></div>
            <div class="cart-total">
                <strong>Total: </strong> Rs. <span id="total-price">0</span>
            </div>
            <button class="checkout-btn" id="checkout-btn">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-checkout">&times;</span>
            <h2>Checkout Details</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>
                <div class="form-group">
                    <label for="address">Delivery Address</label>
                    <textarea id="address" rows="3" required></textarea>
                </div>
                <button type="submit" class="place-order-btn">Place Order</button>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 AK Beauty Shop. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
